[project]
name = "docmate-parser-contracts"
version = "0.1.0"
description = "Shared parser contracts for DocMate services"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.12.0",
]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
