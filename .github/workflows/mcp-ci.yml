name: MCP package CI

on:
  pull_request:
    paths:
      - "apps/mcp/**"
      - ".github/workflows/mcp-ci.yml"
  push:
    branches:
      - main
      - feat/**
      - feature/**
    paths:
      - "apps/mcp/**"
      - ".github/workflows/mcp-ci.yml"

defaults:
  run:
    working-directory: apps/mcp

jobs:
  build-and-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: apps/mcp/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack npm tarball
        run: npm pack
