name: Publish @qxinm/docmate-mcp

on:
  workflow_dispatch:
    inputs:
      confirm_version:
        description: Must exactly match apps/mcp/package.json version (required for manual publish)
        required: true
        type: string
  push:
    tags:
      - "v*"
      - "mcp/v*"

defaults:
  run:
    working-directory: apps/mcp

jobs:
  version:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mcp
    outputs:
      semver: ${{ steps.semver.outputs.value }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: semver
        run: echo "value=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

  publish:
    needs: version
    runs-on: ubuntu-latest
    concurrency:
      group: mcp-npm-${{ needs.version.outputs.semver }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm
          cache-dependency-path: apps/mcp/pnpm-lock.yaml

      - name: Verify manual dispatch version
        if: github.event_name == 'workflow_dispatch'
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          CONFIRM="${{ github.event.inputs.confirm_version }}"
          if [ "$CONFIRM" != "$PACKAGE_VERSION" ]; then
            echo "confirm_version (${CONFIRM}) must equal package.json version (${PACKAGE_VERSION})."
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Pack npm tarball
        run: npm pack

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="${GITHUB_REF_NAME}"
          if [[ "$TAG_NAME" == mcp/v* ]]; then
            TAG_VERSION="${TAG_NAME#mcp/v}"
          elif [[ "$TAG_NAME" == v* ]]; then
            TAG_VERSION="${TAG_NAME#v}"
          else
            echo "Unexpected tag name: $TAG_NAME"
            exit 1
          fi
          if [ "$PACKAGE_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=${PACKAGE_VERSION} tag=${TAG_VERSION} (ref=${TAG_NAME})"
            exit 1
          fi

      - name: Publish package
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
