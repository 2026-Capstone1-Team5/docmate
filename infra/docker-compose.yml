services:
  postgres:
    image: postgres:17-alpine
    container_name: document-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-document_agent_api}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-document_agent_api}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../apps/api/docker/postgres/init:/docker-entrypoint-initdb.d:ro

  redis:
    image: redis:7-alpine
    container_name: document-agent-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    container_name: document-agent-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: ["server", "/data", "--console-address", ":9001"]
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:9000/minio/health/live > /dev/null || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - minio-data:/data

  minio-init:
    image: minio/mc:latest
    container_name: document-agent-minio-init
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://document-agent-minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin} &&
      mc mb --ignore-existing local/${STORAGE_BUCKET:-document-agent-api} &&
      mc anonymous set private local/${STORAGE_BUCKET:-document-agent-api}
      "

  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    container_name: document-agent-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      PORT: 8000
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/document_agent_api}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://127.0.0.1:3001,http://localhost:3001}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-dev-only-change-this-key}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:-1800}
      STORAGE_BACKEND: ${DOCKER_STORAGE_BACKEND:-r2}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-data/storage}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-document-agent-api}
      STORAGE_R2_ENDPOINT: ${DOCKER_STORAGE_R2_ENDPOINT:-http://document-agent-minio:9000}
      STORAGE_R2_ACCESS_KEY_ID: ${DOCKER_STORAGE_R2_ACCESS_KEY_ID:-minioadmin}
      STORAGE_R2_SECRET_ACCESS_KEY: ${DOCKER_STORAGE_R2_SECRET_ACCESS_KEY:-minioadmin}
      STORAGE_R2_REGION: ${STORAGE_R2_REGION:-auto}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-redis}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      PARSE_JOB_QUEUE_NAME: ${PARSE_JOB_QUEUE_NAME:-document-agent-api:parse-jobs}
      PARSER_TIMEOUT_SECONDS: ${PARSER_TIMEOUT_SECONDS:-300}
      PDFTOTEXT_COMMAND: ${PDFTOTEXT_COMMAND:-pdftotext}
      ENABLED_PARSER_BACKENDS: ${ENABLED_PARSER_BACKENDS:-markitdown,pdftotext,document_ai}
      DOCUMENT_AI_SCRIPT_PATH: ${DOCUMENT_AI_SCRIPT_PATH:-/app/apps/ai/scripts/parse_document.py}
      WORKER_TEMP_ROOT: ${WORKER_TEMP_ROOT:-/tmp/document-agent-api-worker}
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - ../apps/ai:/app/apps/ai:ro
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8000/healthz > /dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../apps/api
      dockerfile: Dockerfile.worker
    container_name: document-agent-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/document_agent_api}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-dev-only-change-this-key}
      AUTH_ACCESS_TOKEN_TTL_SECONDS: ${AUTH_ACCESS_TOKEN_TTL_SECONDS:-1800}
      STORAGE_BACKEND: ${DOCKER_STORAGE_BACKEND:-r2}
      STORAGE_LOCAL_ROOT: ${STORAGE_LOCAL_ROOT:-data/storage}
      STORAGE_BUCKET: ${STORAGE_BUCKET:-document-agent-api}
      STORAGE_R2_ENDPOINT: ${DOCKER_STORAGE_R2_ENDPOINT:-http://document-agent-minio:9000}
      STORAGE_R2_ACCESS_KEY_ID: ${DOCKER_STORAGE_R2_ACCESS_KEY_ID:-minioadmin}
      STORAGE_R2_SECRET_ACCESS_KEY: ${DOCKER_STORAGE_R2_SECRET_ACCESS_KEY:-minioadmin}
      STORAGE_R2_REGION: ${STORAGE_R2_REGION:-auto}
      QUEUE_BACKEND: ${QUEUE_BACKEND:-redis}
      REDIS_URL: ${DOCKER_REDIS_URL:-redis://redis:6379/0}
      PARSE_JOB_QUEUE_NAME: ${PARSE_JOB_QUEUE_NAME:-document-agent-api:parse-jobs}
      WORKER_POLL_TIMEOUT_SECONDS: ${WORKER_POLL_TIMEOUT_SECONDS:-5}
      PARSER_TIMEOUT_SECONDS: ${PARSER_TIMEOUT_SECONDS:-300}
      PDFTOTEXT_COMMAND: ${PDFTOTEXT_COMMAND:-pdftotext}
      ENABLED_PARSER_BACKENDS: ${ENABLED_PARSER_BACKENDS:-markitdown,pdftotext,document_ai}
      DOCUMENT_AI_SCRIPT_PATH: ${DOCUMENT_AI_SCRIPT_PATH:-/app/apps/ai/scripts/parse_document.py}
      MINERU_COMPOSE_FILE: ${MINERU_COMPOSE_FILE:-/app/apps/ai/compose.yaml}
      WORKER_TEMP_ROOT: ${WORKER_TEMP_ROOT:-/tmp/document-agent-api-worker}
      WORKER_HOST_TEMP_ROOT: ${WORKER_HOST_TEMP_ROOT:-/tmp/document-agent-api-worker}
    volumes:
      - ../apps/ai:/app/apps/ai:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - ${WORKER_HOST_TEMP_ROOT:-/tmp/document-agent-api-worker}:${WORKER_TEMP_ROOT:-/tmp/document-agent-api-worker}

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      args:
        NEXT_PUBLIC_DOCUMENT_AI_PARSER_ENABLED: ${NEXT_PUBLIC_DOCUMENT_AI_PARSER_ENABLED:-true}
    container_name: document-agent-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DOCUMENT_AGENT_API_BASE_URL: ${DOCUMENT_AGENT_API_BASE_URL:-http://api:8000}
      NEXT_PUBLIC_DOCUMENT_AGENT_API_BASE_URL: ${NEXT_PUBLIC_DOCUMENT_AGENT_API_BASE_URL:-http://127.0.0.1:8000}
      DOCUMENT_AI_PARSER_ENABLED: ${DOCUMENT_AI_PARSER_ENABLED:-true}
      NEXT_PUBLIC_DOCUMENT_AI_PARSER_ENABLED: ${NEXT_PUBLIC_DOCUMENT_AI_PARSER_ENABLED:-true}
    ports:
      - "${WEB_PORT:-3001}:3000"

volumes:
  postgres-data:
  redis-data:
  minio-data:
