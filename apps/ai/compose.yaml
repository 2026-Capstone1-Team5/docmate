services:
  mineru-cpu:
    build:
      context: .
      dockerfile: Dockerfile.mineru-cpu
    working_dir: /workspace
    environment:
      HF_HOME: /opt/mineru-cache/huggingface
      MPLCONFIGDIR: /opt/mineru-cache/matplotlib
      YOLO_CONFIG_DIR: /opt/mineru-cache/ultralytics
      MINERU_MODEL_SOURCE: huggingface
      MINERU_PDF_RENDER_THREADS: "1"
      PARSER_TIMEOUT_SECONDS: ${PARSER_TIMEOUT_SECONDS:-300}
      PDFTOTEXT_COMMAND: ${PDFTOTEXT_COMMAND:-pdftotext}
    volumes:
      - mineru-cache:/opt/mineru-cache
      - .:/workspace:ro
    command: bash

  document-ai:
    build:
      context: .
      dockerfile: Dockerfile.mineru-cpu
    working_dir: /workspace
    environment:
      HF_HOME: /opt/mineru-cache/huggingface
      MPLCONFIGDIR: /opt/mineru-cache/matplotlib
      YOLO_CONFIG_DIR: /opt/mineru-cache/ultralytics
      MINERU_MODEL_SOURCE: huggingface
      MINERU_PDF_RENDER_THREADS: "1"
      PARSER_TIMEOUT_SECONDS: ${PARSER_TIMEOUT_SECONDS:-300}
      PDFTOTEXT_COMMAND: ${PDFTOTEXT_COMMAND:-pdftotext}
    volumes:
      - mineru-cache:/opt/mineru-cache
      - .:/workspace:ro
    ports:
      - "${DOCUMENT_AI_PORT:-8001}:8001"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://127.0.0.1:8001/health > /dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    command:
      - python -m uvicorn server:app --host 0.0.0.0 --port 8001

volumes:
  mineru-cache:
